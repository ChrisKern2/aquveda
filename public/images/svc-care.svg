  </defs>
  <rect width="800" height="450" fill="url(#bg4)"/>
  <path d="M0 384 q 60 -26 120 0 t 120 0 t 120 0 t 120 0 t 120 0 t 120 0 V450 H0 Z" fill="#15919b" opacity="0.15"/>
