  <g transform="translate(545 216)">
    <path d="M0 -64 a64 64 0 0 1 60 40" fill="none" stroke="#7dbee6" stroke-width="11" stroke-linecap="round"/>
    <path d="M60 -24 l4 -22 l-22 6 Z" fill="#7dbee6"/>
