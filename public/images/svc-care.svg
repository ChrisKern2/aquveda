    <rect x="-15" y="-40" width="30" height="92" rx="15" fill="#ffffff" stroke="#143c5f" stroke-width="5"/>
    <path d="M-10 16 h20 v26 a10 10 0 0 1 -20 0 Z" fill="url(#water4)"/>
