    <rect x="314" y="193" width="86" height="13" rx="6" fill="#cde6e8"/>
    <circle cx="290" cy="244" r="13" fill="#15919b"/><path d="M283 244 l5 5 9 -10" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
