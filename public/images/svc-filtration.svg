<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="Whole-home water filtration tank on the main line">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eaf3f9"/><stop offset="1" stop-color="#f0eae0"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7dbee6"/><stop offset="1" stop-color="#2278b5"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- faint house -->
  <path d="M120 150 L300 60 L480 150 V330 H120 Z" fill="#143c5f" opacity="0.06"/>
  <path d="M95 158 L300 50 L505 158" fill="none" stroke="#143c5f" stroke-width="6" stroke-linejoin="round" opacity="0.12"/>
  <!-- waves -->
  <path d="M0 372 q 60 -26 120 0 t 120 0 t 120 0 t 120 0 t 120 0 t 120 0 V450 H0 Z" fill="#2278b5" opacity="0.16"/>
  <path d="M0 396 q 60 -22 120 0 t 120 0 t 120 0 t 120 0 t 120 0 t 120 0 V450 H0 Z" fill="#143c5f" opacity="0.12"/>
  <!-- inlet/outlet pipes -->
  <path d="M360 300 H300 a18 18 0 0 1 -18 -18 V250" fill="none" stroke="#51606c" stroke-width="13" stroke-linecap="round"/>
  <path d="M440 300 H500 a18 18 0 0 0 18 -18 V250" fill="none" stroke="#51606c" stroke-width="13" stroke-linecap="round"/>
  <!-- tank -->
  <rect x="332" y="150" width="136" height="210" rx="56" fill="#ffffff" stroke="#143c5f" stroke-width="6"/>
  <clipPath id="tankc"><rect x="332" y="150" width="136" height="210" rx="56"/></clipPath>
  <g clip-path="url(#tankc)">
    <rect x="332" y="232" width="136" height="128" fill="url(#water)" opacity="0.9"/>
    <circle cx="372" cy="285" r="8" fill="#ffffff" opacity="0.5"/>
    <circle cx="416" cy="312" r="6" fill="#ffffff" opacity="0.45"/>
    <circle cx="438" cy="262" r="5" fill="#ffffff" opacity="0.4"/>
  </g>
  <!-- valve head -->
  <rect x="356" y="120" width="88" height="46" rx="10" fill="#143c5f"/>
  <rect x="372" y="104" width="56" height="22" rx="7" fill="#2278b5"/>
  <circle cx="400" cy="143" r="9" fill="#7dbee6"/>
  <!-- droplet badge -->
  <path d="M620 250 C 620 250 596 280 596 300 a24 24 0 1 0 48 0 C 644 280 620 250 620 250 Z" fill="#2278b5"/>
  <path d="M612 300 q 8 -8 16 0" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
</svg>
