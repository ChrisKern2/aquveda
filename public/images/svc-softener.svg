<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="Water softener resin tank and brine salt tank">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cde6e8"/><stop offset="1" stop-color="#e9e1d2"/>
    </linearGradient>
    <linearGradient id="water2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7fd3dc"/><stop offset="1" stop-color="#15919b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg2)"/>
  <path d="M0 372 q 60 -26 120 0 t 120 0 t 120 0 t 120 0 t 120 0 t 120 0 V450 H0 Z" fill="#15919b" opacity="0.16"/>
  <path d="M0 396 q 60 -22 120 0 t 120 0 t 120 0 t 120 0 t 120 0 t 120 0 V450 H0 Z" fill="#0e3a43" opacity="0.12"/>
  <!-- connecting pipe -->
  <path d="M360 250 H440" fill="none" stroke="#5e7177" stroke-width="12" stroke-linecap="round"/>
  <!-- resin tank (tall) -->
  <rect x="270" y="120" width="120" height="240" rx="50" fill="#ffffff" stroke="#0e3a43" stroke-width="6"/>
  <clipPath id="rt"><rect x="270" y="120" width="120" height="240" rx="50"/></clipPath>
  <g clip-path="url(#rt)"><rect x="270" y="210" width="120" height="150" fill="url(#water2)" opacity="0.9"/>
    <circle cx="306" cy="262" r="7" fill="#fff" opacity="0.5"/><circle cx="350" cy="300" r="5" fill="#fff" opacity="0.45"/>
  </g>
  <rect x="296" y="92" width="68" height="40" rx="9" fill="#0e3a43"/>
  <circle cx="330" cy="112" r="8" fill="#3db8c6"/>
  <!-- brine / salt tank (shorter, square) -->
  <rect x="430" y="200" width="140" height="160" rx="20" fill="#ffffff" stroke="#0e3a43" stroke-width="6"/>
  <rect x="430" y="180" width="140" height="34" rx="12" fill="#0e3a43"/>
  <clipPath id="bt"><rect x="436" y="214" width="128" height="140" rx="14"/></clipPath>
  <g clip-path="url(#bt)">
    <rect x="436" y="290" width="128" height="64" fill="#e9e1d2"/>
    <!-- salt pellets -->
    <g fill="#ffffff" stroke="#5e7177" stroke-width="2">
      <circle cx="466" cy="300" r="9"/><circle cx="494" cy="312" r="10"/><circle cx="522" cy="300" r="8"/>
      <circle cx="548" cy="314" r="9"/><circle cx="480" cy="330" r="9"/><circle cx="514" cy="332" r="10"/><circle cx="544" cy="336" r="7"/>
    </g>
  </g>
  <text x="500" y="250" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#15919b" text-anchor="middle">SALT</text>
</svg>
